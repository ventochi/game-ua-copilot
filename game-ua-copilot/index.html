<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game UA AI Copilot · 游戏买量投放副驾驶</title>
<style>
  :root{
    --bg:#0e1117; --panel:#161b24; --panel2:#1c2330; --border:#283142;
    --txt:#e6edf3; --muted:#8b98a9; --accent:#4f9dff; --accent2:#7c5cff;
    --green:#3fb950; --red:#f85149; --yellow:#e3b341; --orange:#ff8c42;
    --radius:14px; --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;line-height:1.55}
  .app{display:flex;min-height:100vh}
  /* sidebar */
  .side{width:248px;background:var(--panel);border-right:1px solid var(--border);padding:18px 14px;position:fixed;height:100vh;overflow-y:auto;z-index:20}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px;border-bottom:1px solid var(--border);margin-bottom:14px}
  .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:20px}
  .brand h1{font-size:15px;font-weight:700;letter-spacing:.2px}
  .brand p{font-size:11px;color:var(--muted)}
  .nav{list-style:none;display:flex;flex-direction:column;gap:3px}
  .nav li{padding:10px 12px;border-radius:9px;cursor:pointer;font-size:13.5px;color:var(--muted);display:flex;align-items:center;gap:10px;transition:.15s;font-weight:500}
  .nav li:hover{background:var(--panel2);color:var(--txt)}
  .nav li.active{background:linear-gradient(135deg,rgba(79,157,255,.18),rgba(124,92,255,.18));color:var(--txt);box-shadow:inset 0 0 0 1px rgba(79,157,255,.35)}
  .nav .ico{font-size:16px;width:20px;text-align:center}
  .side-foot{margin-top:18px;padding:12px;background:var(--panel2);border-radius:10px;font-size:11px;color:var(--muted)}
  .side-foot b{color:var(--txt)}
  /* main */
  .main{margin-left:248px;flex:1;padding:26px 30px 60px;max-width:1180px}
  .topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:22px}
  .topbar h2{font-size:22px;font-weight:700}
  .topbar .sub{font-size:13px;color:var(--muted);margin-top:3px}
  .controls{display:flex;gap:8px;align-items:center}
  .btn{background:var(--panel2);border:1px solid var(--border);color:var(--txt);padding:8px 14px;border-radius:9px;font-size:13px;cursor:pointer;transition:.15s;font-weight:500}
  .btn:hover{border-color:var(--accent);color:#fff}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff}
  .btn.primary:hover{opacity:.9}
  /* cards */
  .grid{display:grid;gap:14px}
  .g4{grid-template-columns:repeat(4,1fr)}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g2{grid-template-columns:repeat(2,1fr)}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
  .card h3{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .kpi{position:relative;overflow:hidden}
  .kpi .label{font-size:12px;color:var(--muted);font-weight:500}
  .kpi .val{font-size:26px;font-weight:700;margin:6px 0 2px;font-variant-numeric:tabular-nums}
  .kpi .chg{font-size:12px;font-weight:600}
  .up{color:var(--green)} .down{color:var(--red)}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
  .b-red{background:rgba(248,81,73,.15);color:var(--red)}
  .b-green{background:rgba(63,185,80,.15);color:var(--green)}
  .b-yellow{background:rgba(227,179,65,.15);color:var(--yellow)}
  .b-blue{background:rgba(79,157,255,.15);color:var(--accent)}
  /* table */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px}
  td{font-variant-numeric:tabular-nums}
  tr:hover td{background:rgba(255,255,255,.02)}
  .num{text-align:right}
  /* report block */
  .report{background:var(--panel2);border-radius:10px;padding:18px;font-size:13.5px;line-height:1.75;white-space:pre-wrap;font-family:var(--mono)}
  .report .h{color:var(--accent);font-weight:700}
  .alert{border-left:3px solid;padding:12px 14px;border-radius:0 9px 9px 0;margin-bottom:10px;font-size:13px;background:var(--panel2)}
  .alert.crit{border-color:var(--red)} .alert.warn{border-color:var(--yellow)} .alert.info{border-color:var(--accent)} .alert.ok{border-color:var(--green)}
  .alert .t{font-weight:600;margin-bottom:4px;display:flex;gap:8px;align-items:center}
  .alert .d{color:var(--muted);font-size:12.5px}
  .alert .act{margin-top:8px;font-size:12.5px;color:var(--txt)}
  .alert .act b{color:var(--accent)}
  /* forms */
  label.fl{display:block;font-size:12.5px;color:var(--muted);margin:12px 0 5px;font-weight:500}
  input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--txt);padding:9px 11px;border-radius:8px;font-size:13px;font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
  .row{display:flex;gap:12px}.row>*{flex:1}
  /* bars */
  .bar{height:7px;background:var(--panel2);border-radius:4px;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:4px}
  .tag{display:inline-block;background:var(--panel2);border:1px solid var(--border);padding:3px 9px;border-radius:20px;font-size:11px;margin:2px 3px 2px 0;color:var(--muted)}
  .hint{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6}
  .pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .pill{padding:6px 13px;border-radius:20px;font-size:12.5px;cursor:pointer;border:1px solid var(--border);background:var(--panel2);color:var(--muted)}
  .pill.on{background:rgba(79,157,255,.18);border-color:var(--accent);color:#fff}
  .sec-title{font-size:13px;color:var(--muted);font-weight:600;margin:22px 0 10px;text-transform:uppercase;letter-spacing:.5px}
  .copy-out{position:relative}
  code.inline{background:var(--panel2);padding:2px 6px;border-radius:5px;font-family:var(--mono);font-size:12px;color:var(--accent)}
  .view{display:none}.view.active{display:block;animation:fade .25s}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .menu-btn{display:none}
  @media(max-width:900px){
    .side{transform:translateX(-100%);transition:.25s}.side.open{transform:none}
    .main{margin-left:0;padding:18px 16px 50px}
    .g4,.g3,.g2{grid-template-columns:1fr}
    .menu-btn{display:block}
  }
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="side" id="side">
    <div class="brand">
      <div class="logo">🎮</div>
      <div><h1>UA AI Copilot</h1><p>游戏买量投放副驾驶</p></div>
    </div>
    <ul class="nav" id="nav">
      <li data-v="report" class="active"><span class="ico">📊</span>每日投放日报</li>
      <li data-v="anomaly"><span class="ico">🚨</span>异常检测预警</li>
      <li data-v="doctor"><span class="ico">🩺</span>Campaign Doctor</li>
      <li data-v="creative"><span class="ico">🎨</span>素材智能分析</li>
      <li data-v="budget"><span class="ico">💰</span>预算 & ROAS 预测</li>
      <li data-v="experiment"><span class="ico">🧪</span>实验设计计算器</li>
      <li data-v="resume"><span class="ico">📝</span>简历项目生成器</li>
      <li data-v="learn"><span class="ico">🎓</span>能力学习路线</li>
    </ul>
    <div class="side-foot">
      <b>数据源</b><br>
      当前：<span id="ds-name">内置仿真数据</span><br>
      <span style="color:var(--muted)">可上传你自己的 CSV 替换</span>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div>
        <button class="btn menu-btn" onclick="document.getElementById('side').classList.toggle('open')">☰</button>
        <h2 id="page-title">每日投放日报</h2>
        <div class="sub" id="page-sub">多渠道 UA 数据自动汇总 · CPI / ROAS / 异常 / 明日动作</div>
      </div>
      <div class="controls">
        <input type="file" id="csv" accept=".csv" style="display:none" onchange="loadCSV(event)">
        <button class="btn" onclick="document.getElementById('csv').click()">⬆ 上传CSV</button>
        <button class="btn" onclick="regenData()">🔄 换一批数据</button>
      </div>
    </div>

    <!-- ============ 1. 日报 ============ -->
    <section class="view active" id="v-report"></section>
    <!-- ============ 2. 异常 ============ -->
    <section class="view" id="v-anomaly"></section>
    <!-- ============ 3. doctor ============ -->
    <section class="view" id="v-doctor"></section>
    <!-- ============ 4. creative ============ -->
    <section class="view" id="v-creative"></section>
    <!-- ============ 5. budget ============ -->
    <section class="view" id="v-budget"></section>
    <!-- ============ 6. experiment ============ -->
    <section class="view" id="v-experiment"></section>
    <!-- ============ 7. resume ============ -->
    <section class="view" id="v-resume"></section>
    <!-- ============ 8. learn ============ -->
    <section class="view" id="v-learn"></section>
  </main>
</div>

<script>
/* =================================================================
   GAME UA AI COPILOT  —  纯前端 · 零依赖 · 离线可用
   作者交付版。数据为仿真生成，逻辑模拟真实 UA 投放分析。
   ================================================================= */

/* ---------- 工具 ---------- */
const $=s=>document.querySelector(s);
const rnd=(a,b)=>a+Math.random()*(b-a);
const ri=(a,b)=>Math.floor(rnd(a,b+1));
const pick=a=>a[ri(0,a.length-1)];
const fmt=(n,d=0)=>Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const $$=n=>'$'+fmt(n,n<100?2:0);
const pct=n=>(n>=0?'+':'')+n.toFixed(1)+'%';
const clr=(v,inv=false)=>{const g=inv?v<0:v>0;return g?'up':'down';};

/* ---------- 仿真数据模型 ---------- */
const CHANNELS=['Meta','Google','TikTok','AppLovin','Unity','ASA'];
const GEOS=['US','JP','KR','DE','SEA','BR'];
const HOOKS=['失败开局','极限反杀','误导式剧情','福利领取','选择题互动','角色抽卡'];
const GENRES=['SLG','卡牌RPG','放置','消除','射击','生存'];
const ELEMENTS=['角色特写','战斗场景','抽卡动画','基地建设','装备强化','剧情演出'];
const CTAS=['立即下载','领取奖励','挑战关卡','解锁角色'];
const EMOS=['爽感','急迫','惊讶','搞笑','成就感'];

let DATA={};
function genData(){
  const camps=[];
  for(let i=0;i<14;i++){
    const ch=pick(CHANNELS), geo=pick(GEOS);
    const spend=rnd(800,9000);
    const cpm=rnd(4,22);
    const imp=spend/cpm*1000;
    const ctr=rnd(.6,3.8)/100;
    const clk=imp*ctr;
    const cvr=rnd(8,32)/100;       // click->install
    const inst=clk*cvr;
    const cpi=spend/inst;
    const payer=rnd(1.2,4.5)/100;
    const arppu=rnd(18,75);
    const rev_d7=inst*payer*arppu*rnd(.4,.9);
    const roas7=rev_d7/spend;
    const age=ri(1,22);            // campaign 上线天数
    const learning=age<=10;
    camps.push({
      id:'C'+(1000+i), name:`${ch}_${geo}_${pick(GENRES)}`,
      ch,geo,spend,imp,clk,ctr,inst,cpi,cvr,payer,arppu,
      rev:rev_d7,roas7,roas1:roas7*rnd(.25,.4),age,learning,
      d_spend:rnd(-30,55), d_cpi:rnd(-25,40), d_roas:rnd(-35,30), d_inst:rnd(-30,45),
      budget:Math.ceil(spend*rnd(.95,1.6)/100)*100, paceHr:ri(8,23)
    });
  }
  // creatives
  const cres=[];
  for(let i=0;i<16;i++){
    const ctr=rnd(.8,4.2)/100, cvr=rnd(6,30)/100;
    const cpi=rnd(.6,5.5), roas=rnd(.15,1.4);
    const ipm=rnd(3,18);
    cres.push({
      id:'AD'+(200+i), hook:pick(HOOKS),genre:pick(GENRES),el:pick(ELEMENTS),
      cta:pick(CTAS),emo:pick(EMOS),geo:pick(GEOS),
      ctr,cvr,cpi,roas,ipm,spend:rnd(200,3500),
      ageDays:ri(1,18), imp:rnd(20000,500000)
    });
  }
  // totals
  const sum=(k)=>camps.reduce((a,c)=>a+c[k],0);
  const tSpend=sum('spend'),tInst=sum('inst'),tRev=sum('rev'),tImp=sum('imp'),tClk=sum('clk');
  DATA={camps,cres,t:{
    spend:tSpend,inst:tInst,rev:tRev,cpi:tSpend/tInst,roas7:tRev/tSpend,
    ctr:tClk/tImp,cvr:tInst/tClk,imp:tImp,
    d_spend:rnd(-12,28),d_cpi:rnd(-15,22),d_roas:rnd(-18,16),d_inst:rnd(-15,30)
  }, source:'内置仿真数据'};
}

/* ===================================================================
   模块 1：每日日报
   =================================================================== */
function renderReport(){
  const t=DATA.t;
  const top=[...DATA.cres].sort((a,b)=>b.roas-a.roas).slice(0,3);
  const bot=[...DATA.cres].sort((a,b)=>a.roas-b.roas).slice(0,3);
  const kpis=[
    ['总花费',$$(t.spend),t.d_spend,true],
    ['安装量',fmt(t.inst),t.d_inst,false],
    ['CPI',$$(t.cpi),t.d_cpi,true],
    ['D7 ROAS',(t.roas7*100).toFixed(0)+'%',t.d_roas,false],
  ];
  let html=`<div class="grid g4">`;
  kpis.forEach(([l,v,c,inv])=>{
    html+=`<div class="card kpi"><div class="label">${l}</div><div class="val">${v}</div>
      <div class="chg ${clr(c,inv)}">${pct(c)} <span style="color:var(--muted)">vs 昨日</span></div></div>`;
  });
  html+=`</div>`;

  // AI 自然语言总结
  const worst=[...DATA.camps].sort((a,b)=>a.roas7-b.roas7)[0];
  const best=[...DATA.camps].sort((a,b)=>b.roas7-a.roas7)[0];
  html+=`<div class="card" style="margin-top:14px"><h3>🤖 AI 投放总结（自然语言）</h3>
    <div class="report"><span class="h">【今日概览】</span>
全渠道共花费 ${$$(t.spend)}，安装 ${fmt(t.inst)} 个，平均 CPI ${$$(t.cpi)}，D7 ROAS ${(t.roas7*100).toFixed(0)}%（环比 ${pct(t.d_roas)}）。

<span class="h">【核心亮点】</span>
· 表现最好：${best.name}，D7 ROAS ${(best.roas7*100).toFixed(0)}%，CPI ${$$(best.cpi)}${best.roas7>0.6?'，建议小幅放量。':'。'}
· 最佳素材：${top[0].id}（${top[0].hook}/${top[0].genre}），ROAS ${(top[0].roas*100).toFixed(0)}%，IPM ${top[0].ipm.toFixed(1)}。

<span class="h">【核心风险】</span>
· 表现最差：${worst.name}，D7 ROAS ${(worst.roas7*100).toFixed(0)}%，CPI ${$$(worst.cpi)}${worst.learning?'（仍在学习期 Day '+worst.age+'，建议先观察不要大改）':'，已过学习期，建议诊断或降预算'}。
· 疲劳素材：${bot[0].id} ROAS 仅 ${(bot[0].roas*100).toFixed(0)}%，已投放 ${bot[0].ageDays} 天，建议下线。

<span class="h">【明日建议动作】</span>
1. ${best.name} 预算 +15%（不超过学习期约束），观察边际 ROAS。
2. ${worst.learning?'保持 '+worst.name+' 不动，等学习期结束再判断。':worst.name+' 降预算 20% 或拆分素材测试。'}
3. 下线疲劳素材 ${bot[0].id}、${bot[1].id}，补充 ${pick(HOOKS)} 方向新素材。
4. 检查 ${pick(GEOS)} 地区 SKAN 回传是否延迟，避免误判 ROAS。
</div></div>`;

  // pacing 提示
  const over=DATA.camps.filter(c=>c.spend>c.budget*0.95);
  html+=`<div class="sec-title">⏱ 预算 Pacing 速览</div><div class="card"><table>
    <tr><th>Campaign</th><th class="num">日预算</th><th class="num">已花</th><th>消耗进度</th><th>状态</th></tr>`;
  DATA.camps.slice(0,6).forEach(c=>{
    const p=Math.min(c.spend/c.budget*100,140);
    const st=p>100?['超花','b-red']:p>85?['正常偏快','b-yellow']:p<40?['花不出去','b-blue']:['健康','b-green'];
    html+=`<tr><td>${c.name}</td><td class="num">${$$(c.budget)}</td><td class="num">${$$(c.spend)}</td>
      <td><div class="bar"><i style="width:${Math.min(p,100)}%;background:${p>100?'var(--red)':p>85?'var(--yellow)':'var(--green)'}"></i></div></td>
      <td><span class="badge ${st[1]}">${st[0]}</span></td></tr>`;
  });
  html+=`</table></div>`;

  html+=`<div class="row" style="margin-top:14px">
    <button class="btn primary" onclick="copyReport()">📋 复制日报文本（发周报/群里）</button></div>`;
  $('#v-report').innerHTML=html;
}
function copyReport(){
  const txt=$('#v-report .report').innerText;
  navigator.clipboard?.writeText(txt);
  alert('✅ 日报已复制到剪贴板，可直接粘贴到企微/Slack/邮件');
}

/* ===================================================================
   模块 2：异常检测
   =================================================================== */
function renderAnomaly(){
  const alerts=[];
  DATA.camps.forEach(c=>{
    if(c.d_cpi>30 && c.spend>1000){
      alerts.push({lv:'crit',t:`CPI 异常上涨 · ${c.name}`,
        d:`CPI ${pct(c.d_cpi)}（高于7日均值30%以上），花费 ${$$(c.spend)} 已达样本阈值。`,
        act:c.learning?`<b>判定：学习期(Day ${c.age})</b> → 建议继续观察，不要在学习期手动大改，会干扰平台模型。`
                      :`<b>判定：已过学习期</b> → 排查单一素材异常 / geo mix 变化 / 出价过高，建议降出价 10-15% 或下线高 CPI 素材。`});
    }
    if(c.d_roas<-25 && c.spend>1000){
      alerts.push({lv:'warn',t:`ROAS 快速下滑 · ${c.name}`,
        d:`D7 ROAS ${pct(c.d_roas)}，当前 ${(c.roas7*100).toFixed(0)}%。`,
        act:`<b>证据链：</b>需区分「成本上升」还是「收入下降」。若 CPI 稳定但 ROAS 跌→排查留存/付费率/SKAN回传延迟；先看证据再动手。`});
    }
    if(c.spend>c.budget*1.05){
      alerts.push({lv:'warn',t:`预算超花 · ${c.name}`,
        d:`已花 ${$$(c.spend)} / 预算 ${$$(c.budget)}，超出 ${((c.spend/c.budget-1)*100).toFixed(0)}%。`,
        act:`<b>动作：</b>检查是否手动放量未记录，或自动出价跑飞。建议核对 change log。`});
    }
  });
  // CTR高CVR低
  DATA.cres.forEach(c=>{
    if(c.ctr>0.03 && c.cvr<0.12){
      alerts.push({lv:'info',t:`素材点击高但转化差 · ${c.id}`,
        d:`CTR ${(c.ctr*100).toFixed(1)}%（高）但 CVR ${(c.cvr*100).toFixed(0)}%（低），素材类型 ${c.hook}/${c.genre}。`,
        act:`<b>诊断：</b>素材吸引点 ≠ 真实玩法，落地页/商店页与素材预期不符。建议优化商店页截图或调整 hook 与玩法一致性。`});
    }
  });
  if(!alerts.length) alerts.push({lv:'ok',t:'今日无重大异常',d:'所有 campaign 指标在正常波动范围内。',act:'保持当前节奏，关注疲劳素材轮换。'});

  // 排序：crit>warn>info>ok
  const order={crit:0,warn:1,info:2,ok:3};
  alerts.sort((a,b)=>order[a.lv]-order[b.lv]);

  let html=`<div class="card"><h3>🚨 异常检测规则引擎（含证据链，不直接改账户）</h3>

    <div class="card"><h3>📈 D1→D7→D30 回收曲线（示意）</h3>${roasCurve()}</div>
  </div>`;
  $('#v-budget').innerHTML=html;
}
function roasCurve(){
  const days=[0,1,3,7,14,30];
  const vals=[18,32,55,78,95,118];
  const W=320,H=140,pad=28;
  const mx=Math.max(...vals);
  const pts=vals.map((v,i)=>{
    const x=pad+(i/(vals.length-1))*(W-pad*1.4);
    const y=H-pad-(v/mx)*(H-pad*1.6);
    return [x,y];
  });
  const path=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(0)+' '+p[1].toFixed(0)).join(' ');
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%">`;
  svg+=`<line x1="${pad}" y1="${H-pad}" x2="${W-8}" y2="${H-pad}" stroke="#283142"/>`;
  svg+=`<path d="${path}" fill="none" stroke="url(#g)" stroke-width="2.5"/>`;
  svg+=`<defs><linearGradient id="g" x1="0" x2="1"><stop offset="0" stop-color="#4f9dff"/><stop offset="1" stop-color="#7c5cff"/></linearGradient></defs>`;
  pts.forEach((p,i)=>{svg+=`<circle cx="${p[0]}" cy="${p[1]}" r="3.5" fill="#7c5cff"/>
    <text x="${p[0]}" y="${p[1]-8}" fill="#8b98a9" font-size="9" text-anchor="middle">${vals[i]}%</text>
    <text x="${p[0]}" y="${H-pad+14}" fill="#8b98a9" font-size="9" text-anchor="middle">D${days[i]}</text>`;});
  svg+=`</svg>`;
  return svg;
}

function runExp(){
  const base=parseFloat($('#ex-base').value)/100;
  const mde=parseFloat($('#ex-mde').value)/100;
  const daily=parseFloat($('#ex-daily').value);
  // 简化样本量公式（双侧95%，power80%，z=1.96/0.84）
  const p1=base, p2=base*(1+mde);
  const pbar=(p1+p2)/2;
  const z=1.96+0.84;
  const n=Math.ceil((z*z*pbar*(1-pbar)*2)/Math.pow(p2-p1,2));
  const days=Math.ceil(n/daily);
  const type=$('#ex-type').value, metric=$('#ex-metric').value;
  $('#ex-out').innerHTML=`<div class="card"><h3>📋 实验方案 · ${type}</h3>
    <div class="grid g3"><div class="card kpi"><div class="label">每组所需样本</div><div class="val">${fmt(n)}</div><div class="chg" style="color:var(--muted)">安装/组</div></div>
    <div class="card kpi"><div class="label">预计观察周期</div><div class="val">${days}<span style="font-size:14px"> 天</span></div><div class="chg" style="color:var(--muted)">按 ${daily}/日</div></div>
    <div class="card kpi"><div class="label">统计置信</div><div class="val">95%</div><div class="chg" style="color:var(--muted)">power 80%</div></div></div>
    <div class="report" style="margin-top:14px"><span class="h">【实验假设】</span>
${type}可使 ${metric} 相对提升 ≥ ${($('#ex-mde').value)}%。

<span class="h">【分组】</span>
实验组：应用新变量 / 对照组：保持现状（建议加 holdout）

<span class="h">【主指标】</span>${metric}　【辅助指标】CPI、留存、付费率

<span class="h">【最低样本量】</span>每组 ${fmt(n)} 个安装（共 ${fmt(n*2)}）

<span class="h">【观察周期】</span>≥ ${days} 天，且必须覆盖完整 SKAN 回传窗口

<span class="h">【停止条件】</span>达到样本量 且 置信区间不跨0；不可中途偷看就停（避免 p-hacking）

<span class="h">【成功标准】</span>${metric} 提升显著(p<0.05) 且 在固定回收窗口内 ROAS 不劣化

<span class="h">【干扰因素】</span>版本更新、活动、节假日、竞品买量、SKAN 延迟、geo mix 变化
</div></div>`;
}

/* ---------- CSV 上传（可选，替换仿真数据） ---------- */
function loadCSV(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const lines=ev.target.result.trim().split('\n');
      const head=lines[0].split(',').map(s=>s.trim().toLowerCase());
      const rows=lines.slice(1).map(l=>{const c=l.split(',');const o={};head.forEach((h,i)=>o[h]=c[i]?.trim());return o;});
      // 尝试映射常见字段
      const camps=rows.filter(r=>r.spend).map((r,i)=>{
        const spend=+r.spend||0, inst=+r.install||+r.installs||1, rev=+r.revenue||+r.rev||0;
        return {id:'C'+i,name:r.campaign||r.name||('Camp'+i),ch:r.channel||r.platform||'-',geo:r.geo||r.country||'-',
          spend,inst,cpi:spend/inst,rev,roas7:rev/spend,roas1:(rev/spend)*0.35,
          ctr:+r.ctr||0.02,cvr:+r.cvr||0.15,payer:0.03,arppu:40,imp:+r.impressions||spend*100,clk:+r.clicks||inst*5,
          age:+r.age||15,learning:(+r.age||15)<=10,d_spend:0,d_cpi:0,d_roas:0,d_inst:0,
          budget:Math.ceil(spend*1.2/100)*100,paceHr:18};
      });
      if(!camps.length)throw'no rows';
      const sum=k=>camps.reduce((a,c)=>a+c[k],0);
      DATA.camps=camps;
      DATA.t={spend:sum('spend'),inst:sum('inst'),rev:sum('rev'),cpi:sum('spend')/sum('inst'),
        roas7:sum('rev')/sum('spend'),ctr:0.02,cvr:0.15,imp:sum('imp'),d_spend:0,d_cpi:0,d_roas:0,d_inst:0};
      DATA.source=f.name;
      $('#ds-name').textContent=f.name;
      renderAll();
      alert('✅ 已加载你的数据：'+f.name+'（'+camps.length+' 个 campaign）\n素材模块仍用仿真数据演示，可在 CSV 加 creative 列扩展。');
    }catch(err){alert('CSV 解析失败，请确保含 spend/install/revenue 等列。已保留仿真数据。\n\n标准列名：campaign,channel,geo,spend,install,revenue,ctr,cvr,age');}
  };
  r.readAsText(f);
}
